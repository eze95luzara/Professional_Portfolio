<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Datos Médicos</title>
     <!-- Agregar enlace al archivo CSS de Bootstrap -->
     <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

     <style>
        body {
            background-color: #f8f9fa; /* Color de fondo */
        }
        .form-group label {
            font-weight: bold;
            color: #0066cc; /* Color para los títulos */
            display: inline-block; /* Mantiene los campos en línea */
            text-align: center;
            margin: auto;
        }
        .form-control {
            border-color: #0066cc; /* Color del borde del campo de entrada */
            width: 150px; /* Anchura deseada para los campos de texto */
            display: inline-block; /* Mantiene los campos en línea */
            text-align: center;
            margin: auto;
        }
        
        .btn-primary {
            background-color: #0066cc; /* Color de fondo del botón */
            border-color: #0066cc; /* Color del borde del botón */
        }
        .btn-primary:hover {
            background-color: #005cbf; /* Cambio de color al pasar el mouse por encima */
            border-color: #005cbf;
        }
    </style>
</head>
<body class="container col-lg-3 col-lg-offset-3">

    <h1 class="text-center display-4 mb-4">Datos Médicos</h1>
    
        <form class="main__form" id="form" action="/predict" method="post">

            <!-- Edad -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="age">Edad:</label>
                <input class="form-control " type="number" id="age" name="age" value="20" required><br>
            </div>
            <!-- Vista Ojo Izquierdo -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="eyesightLeft">Vista Ojo Izquierdo:</label>
                <input class="form-control " type="text" id="eyesightLeft" name="eyesightLeft" value="0.7" required><br>
            </div>
            <!-- Vista Ojo Derecho -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="eyesightRight">Vista Ojo Derecho:</label>
                <input class="form-control " type="text" id="eyesightRight" name="eyesightRight" value="0.9" required><br>
            </div>
            <!-- Presión Sistólica -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="systolic">Presión Sistólica:</label>
                <input class="form-control " type="number" id="systolic" name="systolic" value="119" required><br>
            </div>
            <!-- Presión Diastólica -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="relaxation">Presión Diastólica:</label>
                <input class="form-control " type="number" id="relaxation" name="relaxation" value="79" required><br>
            </div>
            <!-- Glucemia en Ayunas -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="fastingBloodSugar">Glucemia en Ayunas:</label>
                <input class="form-control" type="number" id="fastingBloodSugar" name="fastingBloodSugar" value="88" required><br>
            </div>
            <!-- Colesterol -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="cholesterol">Colesterol:</label>
                <input class="form-control" type="number" id="cholesterol" name="cholesterol" value="211" required><br>
            </div>

            <!-- Triglicéridos -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="triglyceride">Triglicéridos:</label>
                <input class="form-control" type="number" id="triglyceride" name="triglyceride" value="128" required><br>
            </div>
            <!-- HDL -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="hdl">HDL:</label>
                <input class="form-control" type="number" id="hdl" name="hdl" value="71" required><br>
            </div>
            <!-- LDL -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="ldl">LDL:</label>
                <input class="form-control" type="number" id="ldl" name="ldl" value="114" required><br>
            </div>
            <!-- Hemoglobina -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="hemoglobin">Hemoglobina:</label>
                <input class="form-control" type="number" id="hemoglobin" name="hemoglobin" step="0.01" value="15.9" required><br>
            </div>
            <!-- Serum Creatinina -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="serumCreatinine">Serum Creatinina:</label>
                <input class="form-control " type="number" id="serumCreatinine" name="serumCreatinine" step="0.01" value="1.1" required><br>
            </div>
            <!-- AST -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="ast">AST:</label>
                <input class="form-control" type="number" id="ast" name="ast" value="19" required><br>
            </div>
            <!-- ALT -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="alt">ALT:</label>
                <input class="form-control" type="number" id="alt" name="alt" value="25" required><br>
            </div>
            <!-- GTP -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="gtp">GTP:</label>
                <input class="form-control" type="number" id="gtp" name="gtp" value="30" required><br>
            </div>
            <!-- Caries Dentales -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="dentalCaries">Caries Dentales:</label>
                <input class="form-control " type="number" id="dentalCaries" name="dentalCaries" value="1" required><br>
            </div>
            <!-- Índice de Masa Corporal (IMC) -->
            <div class="form-group row">
                <label class="col-sm-6 col-form-label" for="imc">Índ. de Masa Corporal (IMC):</label>
                <input class="form-control" type="number" id="imc" name="imc" step="0.01" value="35" required><br>
            </div>

            <!-- Botón de envío -->
            <div class="d-flex justify-content-center">
                <input class="btn btn-primary btn-lg" type="submit" value="Enviar">
            </div>
    </form>
    <!-- Enlace a Bootstrap JS (opcional) -->
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
